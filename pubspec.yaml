name: needin_app
description: Needin Logistics App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.10.7 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  supabase_flutter: ^2.3.4
  provider: ^6.1.5+1
  google_maps_flutter: ^2.15.0
  geolocator: ^14.0.2
  razorpay_flutter: ^1.4.1
  image_picker: ^1.2.1
  url_launcher: ^6.3.2
  app_links: ^7.0.0
  uuid: ^4.5.3
  intl: ^0.20.2
  http: ^1.6.0
  flutter_polyline_points: ^3.1.0
  flutter_dotenv: ^5.2.1
  cached_network_image: ^3.4.1
  flutter_image_compress: ^2.3.0
  flutter_google_places_sdk: ^0.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - .env
    # Google Maps ToS attribution logos
    - assets/images/google/google_logo_dark_1x.png
    - assets/images/google/google_logo_dark_2x.png
    - assets/images/google/google_logo_dark_4x.png
    - assets/images/google/google_logo_white_1x.png
    - assets/images/google/google_logo_white_2x.png
    - assets/images/google/google_logo_white_4x.png

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf